# ──────────────────────────────────────────────────────────────────────────────
# Template Nginx para produção — usado pelo devops/deploy.sh para configurar
# o Nginx do HOST. O container expõe HTTP na porta __PORT__ e este Nginx
# faz proxy_pass para ele.
#
# IMPORTANTE: Este template usa apenas HTTP (porta 80).
# O certbot --nginx adicionará automaticamente o bloco HTTPS após emitir o certificado.
#
# Placeholders substituídos pelo deploy.sh:
#   __DOMAIN__  → domínio real (ex: meuprojeto.com)
#   __PORT__    → porta HTTP do container (ex: 8080)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name __DOMAIN__;

    # Assets do build — cache longo
    location /build/ {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, immutable";
        expires 1y;
        access_log off;
    }

    # Health check — sem log para não poluir
    location /api/v1/health {
        proxy_pass http://127.0.0.1:__PORT__;
        access_log off;
    }

    # Tudo o mais → container
    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;

        proxy_buffers      16 16k;
        proxy_buffer_size  32k;

        client_max_body_size 50M;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;
}
