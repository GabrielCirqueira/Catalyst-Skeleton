server {
    listen 80;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /var/www/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    # TODO: substitua "curriculos.com" pelo domínio real do projeto
    server_name curriculos.com;

    # TODO: ajuste os caminhos dos certificados para o domínio real
    ssl_certificate     /etc/letsencrypt/live/curriculos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/curriculos.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/public;
    index index.php;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        resolver 127.0.0.11 valid=5s;
        set $upstream symfony:9000;
        fastcgi_pass $upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
