# ──────────────────────────────────────────────────────────────────────────────
# Template Nginx para produção — usado pelo devops/deploy.sh para configurar
# o Nginx do HOST. O container expõe HTTP na porta __PORT__ e este Nginx
# faz proxy_pass para ele — mesmo padrão de uma aplicação Node.js/Rails.
#
# Placeholders substituídos pelo deploy.sh:
#   __DOMAIN__  → domínio real (ex: meuprojeto.com)
#   __PORT__    → porta HTTP do container (ex: 8080)
#
# Para aplicar manualmente:
#   sed -e "s|__DOMAIN__|meuprojeto.com|g" -e "s|__PORT__|8080|g" \
#       docker/nginx/prod.conf > /etc/nginx/sites-available/meuprojeto.com
# ──────────────────────────────────────────────────────────────────────────────

# HTTPS — proxy reverso para o container (porta __PORT__)
server {
    listen 443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Assets do build — cache longo (o container já serve estático, mas
    # podemos dar hint ao Nginx do host também)
    location /build/ {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, immutable";
        expires 1y;
        access_log off;
    }

    # Tudo o mais → container
    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;

        proxy_buffers      16 16k;
        proxy_buffer_size  32k;

        client_max_body_size 50M;
    }

    # Health check — sem log para não poluir
    location /api/v1/health {
        proxy_pass http://127.0.0.1:__PORT__;
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name __DOMAIN__;

    if ($host = __DOMAIN__) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
