; OPcache — configuração para produção
; validate_timestamps=0 desativa revalidação de arquivos em disco (máxima performance)
; Nunca usar com código montado em volume — só quando o código está DENTRO da imagem

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=1
