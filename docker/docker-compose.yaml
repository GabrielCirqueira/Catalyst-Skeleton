services:
  database:
    image: mysql:8.3
    container_name: skeleton_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skeleton
      MYSQL_USER: skeleton
      MYSQL_PASSWORD: skeleton
    ports:
      - "${DATABASE_HOST_PORT:-3309}:${DATABASE_CONTAINER_PORT:-3306}"
    volumes:
      - db_data:/var/lib/mysql

  symfony:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: skeleton_symfony
    restart: always
    env_file:
      - ./ports.env
    ports:
      - "${SUPERVISOR_PORT:-9001}:9001"
    volumes:
      - ..:/var/www/html
    depends_on:
      - database

  nginx:
    image: nginx:alpine
    container_name: skeleton_nginx
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - ..:/var/www/html:ro
    depends_on:
      - symfony

  vite-react:
    build:
      context: ..
      dockerfile: docker/vite/Dockerfile
    container_name: skeleton_vite_react
    working_dir: /app
    user: "${DEV_UID:-1000}:${DEV_GID:-1000}"
    volumes:
      - ..:/app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    env_file:
      - ./ports.env
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - symfony

volumes:
  db_data: