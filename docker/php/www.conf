; Pool PHP-FPM para produção — Catalyst Skeleton
;
; clear_env = no é ESSENCIAL: sem isso, o PHP-FPM limpa todas as variáveis de
; ambiente antes de iniciar os workers, fazendo o Symfony perder DATABASE_URL,
; APP_SECRET, JWT_PASSPHRASE etc. e retornar 500 em todas as requisições.

[www]
user  = www-data
group = www-data

listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Preserva as variáveis de ambiente do container nos workers PHP
clear_env = no

; Logs para stdout/stderr do container
access.log  = /proc/self/fd/2
php_flag[display_errors] = off
