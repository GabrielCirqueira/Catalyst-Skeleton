# ──────────────────────────────────────────────────────────────────────────────
# Nginx interno ao container de produção
# Recebe requisições HTTP na porta 80 e repassa para o php-fpm em 127.0.0.1:9000
# O host Nginx (fora do container) faz proxy_pass para a porta exposta do container.
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Assets estáticos buildados (JS/CSS/imagens) — cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Rota principal — tenta arquivo estático, cai no index.php
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP via FastCGI para o php-fpm local
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        fastcgi_read_timeout 90;
        internal;
    }

    # Bloqueia acesso direto a outros .php
    location ~ \.php$ {
        return 404;
    }
}
